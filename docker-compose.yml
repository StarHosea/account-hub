services:
  app:
    image: ghcr.io/starhosea/account-hub:latest
    container_name: account-hub
    restart: unless-stopped
    ports:
      - "3000:80"
    shm_size: "1gb"
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: postgresql://account_hub:account_hub@postgres:5432/account_hub
      # ACCOUNT_HUB_AUTH_KEY=your_secret_key_here
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: account-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: account_hub
      POSTGRES_PASSWORD: account_hub
      POSTGRES_DB: account_hub
    volumes:
      - account_hub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account_hub -d account_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  account_hub_pgdata:
