services:
  app:
    image: ghcr.io/starhosea/account-hub:latest
    container_name: account-hub
    restart: unless-stopped
    ports:
      - "3000:80"
    # CloakBrowser/Chromium 默认 /dev/shm 仅 64MB 会导致崩溃；提升到 1GB。
    # （引擎启动参数也带了 --disable-dev-shm-usage 双保险。）
    shm_size: "1gb"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      # 存储后端配置 (可选值: json, sqlite, postgres, git)
       - STORAGE_BACKEND=json

      # 激活审计始终落数据库（默认 data/activation_audit.db，重启不丢；与主库分离）
      # - ACTIVATION_AUDIT_DATABASE_URL=sqlite:////app/data/activation_audit.db

      # CloakBrowser 浏览器注册引擎
      # - CLOAKBROWSER_LICENSE_KEY=your_cloakbrowser_pro_license   # 可选（Pro 授权）
      
      # 数据库配置 (当 STORAGE_BACKEND=sqlite/postgres 时使用)
      # - DATABASE_URL=postgresql://user:password@host:5432/dbname
      # - DATABASE_URL=sqlite:///app/data/accounts.db
      
      # Git 仓库配置 (当 STORAGE_BACKEND=git 时使用)
      # - GIT_REPO_URL=https://github.com/user/repo.git
      # - GIT_TOKEN=ghp_xxxxxxxxxxxx
      # - GIT_BRANCH=main
      # - GIT_FILE_PATH=accounts.json
      
      # 认证密钥 (可选，覆盖 config.json)
      # - ACCOUNT_HUB_AUTH_KEY=your_secret_key
      
      # 基础 URL (可选)
      # - ACCOUNT_HUB_BASE_URL=https://your-domain.com
